services:
  api:
    build: .
    container_name: fastapi-app
    ports:
      # Host 8001 → container 8000. (Host 8000 is often taken by Cursor IDE.)
      # Override with API_HOST_PORT=9000 docker compose up if you need another port.
      - "${API_HOST_PORT:-8001}:8000"
    environment:
      - API_KEY=${API_KEY:-demo-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-secret}
      - REDIS_URL=redis://redis:6379
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
    depends_on:
      - redis
      - prometheus
    networks:
      - backend

  ui:
    build: .
    container_name: streamlit-ui
    command: streamlit run frontend/chat_app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      # Same Docker network — fixed internal hostname (overrides auto-detect)
      - API_BASE_URL=http://api:8000
      - API_KEY=${API_KEY:-demo-key}
      - API_PORT=8000
      # Optional semi-public demo gate (unset = no password screen)
      - DEMO_PASSWORD=${DEMO_PASSWORD:-}
    depends_on:
      - api
    networks:
      - backend

  redis:
    image: redis:alpine
    container_name: redis1
    ports:
      - "6379:6379"
    networks:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana1
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - backend

networks:
  backend:
    driver: bridge
